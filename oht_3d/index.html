<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" href="data:," />
    <title>OHT 3D FAB Simulator</title>
    <style>
      :root {
        --bg: #071018;
        --panel: rgba(15, 26, 37, 0.9);
        --line: rgba(137, 173, 196, 0.32);
        --txt: #d9e8f3;
        --muted: #9bb7ca;
        --accent: #27b8ff;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        background: radial-gradient(circle at 20% 0%, #0a1d2c 0%, var(--bg) 60%);
        color: var(--txt);
        overflow: hidden;
        font-family: "Segoe UI", "Noto Sans KR", sans-serif;
      }

      #app {
        width: 100%;
        height: 100%;
        position: relative;
      }

      #hud {
        position: absolute;
        left: 14px;
        top: 14px;
        width: 360px;
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 12px;
        backdrop-filter: blur(8px);
        z-index: 5;
      }

      #hud h1 {
        margin: 0 0 8px;
        font-size: 15px;
        letter-spacing: 0.2px;
      }

      .row {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-top: 8px;
        flex-wrap: wrap;
      }

      .row label {
        min-width: 70px;
        color: var(--muted);
        font-size: 12px;
      }

      .row input[type='range'] {
        flex: 1;
      }

      .btn {
        border: 1px solid var(--line);
        background: #0f2434;
        color: var(--txt);
        padding: 6px 10px;
        border-radius: 8px;
        cursor: pointer;
        font-size: 12px;
      }

      #stats {
        margin-top: 8px;
        white-space: pre-wrap;
        font-size: 12px;
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="hud">
        <h1>OHT 3D FAB Simulator</h1>
        <div class="row">
          <button id="play" class="btn">Play</button>
          <button id="pause" class="btn">Pause</button>
          <button id="reset" class="btn">Reset</button>
        </div>
        <div class="row">
          <label>Speed</label>
          <input id="speed" type="range" min="0.1" max="20" step="0.1" value="6" />
          <span id="speed-value">6.0x</span>
        </div>
        <div class="row">
          <label>Time</label>
          <input id="time" type="range" min="0" max="1" step="0.0001" value="0" />
        </div>
        <div id="stats">Loading scene...</div>
      </div>
    </div>

    <script type="module" src="./sim3d.js"></script>
  </body>
</html>
