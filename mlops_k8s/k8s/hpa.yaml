apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: amhs-gat-streamlit
  namespace: amhs-mlops
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: amhs-gat-streamlit
  minReplicas: 1
  maxReplicas: 3
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 65
